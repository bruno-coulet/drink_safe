services:
  # 1. SERVEUR DE BASE DE DONNÉES (POSTGRESQL)
  postgres-db:
    image: postgres:16-alpine
    container_name: postgres-db
    environment:
      POSTGRES_USER: admin_waterflow
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: waterflow_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin_waterflow -d waterflow_db"]
      interval: 10s
      timeout: 5s
      retries: 5

# 2. SERVEUR DE TRACKING MLFLOW
  mlflow-back:
    build:
      context: .
      dockerfile: docker/mlflow/Dockerfile
    container_name: mlflow-back
    ports:
      - "5000:5000"
    depends_on:
        postgres-db:
          condition: service_healthy
    volumes:
      - mlflow_artifacts:/app/artifacts
    restart: unless-stopped
    command: >
      mlflow server
      --backend-store-uri postgresql://admin_waterflow:${POSTGRES_PASSWORD}@postgres-db:5432/waterflow_db
      --default-artifact-root /app/artifacts
      --host 0.0.0.0
      --port 5000

volumes:
  postgres_data:
  mlflow_artifacts:



 

