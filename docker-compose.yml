services:

  # 1. SERVEUR DE BASE DE DONNÉES (POSTGRESQL)
  postgres-db:
    image: postgres:16-alpine
    container_name: postgres-db
    environment:
      POSTGRES_USER: admin_waterflow
      # MAGIE : Docker va chercher la variable dans ton fichier .env local
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: waterflow_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

# 2. SERVEUR DE TRACKING MLFLOW (IMAGE OFFICIELLE AVEC DRIVERS)
  mlflow-back:
    image: ghcr.io/mlflow/mlflow:v2.11.3
    container_name: mlflow-back
    ports:
      - "5000:5000"
    depends_on:
      - postgres-db
    volumes:
      - ./artifacts:/app/artifacts
    # LA SÉQUENCE MAGIQUE : On installe le driver puis on lance le serveur
    entrypoint: >
      bash -c "
      pip install --no-cache-dir psycopg2-binary && 
      mlflow server
      --backend-store-uri postgresql://admin_waterflow:${POSTGRES_PASSWORD}@postgres-db:5432/waterflow_db 
      --default-artifact-root /app/artifacts 
      --host 0.0.0.0 
      --port 5000"


volumes:
  postgres_data: