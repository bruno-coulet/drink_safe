services:

  mlflow-back:
    image: waterflow-mlflow-back
    container_name: mlflow-back
    ports:
      - "5000:5000"
    volumes:
      - ./runs:/app/runs
      - ./artifacts:/app/artifacts
    # On utilise le backend de type fichier pointant sur /app/runs
    command: mlflow server --backend-store-uri /app/runs --default-artifact-root /app/runs --host 0.0.0.0 --port 5000