apiVersion: 1

contactPoints:
  - orgId: 1
    name: 'Equipe-Exploitation-Email'
    receivers:
      - uid: 'admin-email'
        type: email
        settings:
          addresses: 'bruno.coulet@laplateforme.io'

policies:
  - orgId: 1
    receiver: 'Equipe-Exploitation-Email'
    group_by: ['grafana_folder', 'alertname']

groups:
  - orgId: 1
    name: 'SLA-Services-Externes'
    folder: 'Alertes Critiques'
    interval: 1m
    rules:
      - uid: 'ocr-timeout-alert'
        title: 'Panne Service OCR.space'
        condition: 'A'
        data:
          - refId: 'A'
            datasourceUid: 'prometheus_drink_safe'
            model:
              expr: 'rate(http_requests_total{endpoint="/api/ocr/lab-report",status=~"5.."}[5m]) > 0.1'
              refId: 'A'
            relativeTimeRange:
              from: 300
              to: 0
        for: 5m
        annotations:
          summary: 'Panne critique : Le service OCR externe est en échec'
          description: 'Plus de 10% des requêtes OCR ont échoué (Timeout/5xx) sur les 5 dernières minutes.'
