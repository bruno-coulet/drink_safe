                <form action="{{ url_for('auth.login') }}" method="POST">

                <!-- Champ 1 : Le Rôle (Boutons radio alignés) -->
                <div class="mb-4">
                    <label class="form-label d-block fw-bold">Profil de connexion</label>

                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="role" id="role_client" value="client" checked>

                    </div>
                </div>

            <!-- Champ 2 : Le "Credential" unique (Clé API ou Mot de passe) -->
            <div class="mb-3">
                <label for="credential" class="form-label fw-bold">Clé API (Client) ou Mot de passe (Admin)</label>
                <input type="password" class="form-control" id="credential" name="credential" required>
            </div>

            <button type="submit" class="btn btn-primary w-100">Se connecter</button>
        </form>

<script>
    const radios = document.querySelectorAll('input[name="role"]');
    const label = document.querySelector('label[for="credential"]');
    const input = document.getElementById('credential');
    radios.forEach(r => r.addEventListener('change', () => {
        if (r.value === 'client') {
            label.innerHTML = 'Clé API <span class="text-muted fw-normal">(wf_live_...)</span>';
            input.placeholder = 'wf_live_...';
        } else {
            label.innerHTML = 'Mot de passe';
            input.placeholder = '••••••••';
        }
    }));
</script>
