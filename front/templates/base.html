<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Drink safe{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body>

{% if session.role %}
<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand fw-bold">Drink Safe</span>
    <div class="d-flex align-items-center gap-3">
        <span class="badge
            {% if session.role == 'client' %}bg-primary
            {% elif session.role == 'analyste' %}bg-success
            {% else %}bg-warning text-dark{% endif %}">
            {{ session.role | capitalize }}
        </span>
        <a href="{{ url_for('auth.logout') }}" class="btn btn-sm btn-outline-light">Déconnexion</a>
    </div>
</nav>
{% endif %}

<div class="container py-4">
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
        <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endfor %}
    {% endwith %}

    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
